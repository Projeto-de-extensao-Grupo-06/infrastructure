server {
    listen 80;
    server_name _; 

    # Rota para o Certbot fazer as validações do Let's Encrypt na porta 80
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirecionar todo o tráfego HTTP restante para HTTPS
    # Descomente após rodar o script do Let's Encrypt
    location / {
        return 301 https://$host$request_uri;
    }
}

# =======================================================
# CONFIGURAÇÃO SSL E PROXY REVERSO DAS APPS
# =======================================================

# 1. API - BACKEND (Spring Boot rodando na porta 8000 da VM)
server {
    listen 443 ssl;
    server_name api.seusite.com.br;

    ssl_certificate /etc/letsencrypt/live/api.seusite.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.seusite.com.br/privkey.pem;

    location / {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# 2. SITE INSTITUCIONAL (React/Vite rodando na porta 8081 da VM)
server {
    listen 443 ssl;
    server_name www.seusite.com.br seusite.com.br;

    ssl_certificate /etc/letsencrypt/live/seusite.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seusite.com.br/privkey.pem;

    location / {
        proxy_pass http://host.docker.internal:8081;
        proxy_set_header Host $host;
    }
}

# 3. PAINEL GERENCIAL (React/Vite rodando na porta 8080 da VM)
server {
    listen 443 ssl;
    server_name sistema.seusite.com.br;

    ssl_certificate /etc/letsencrypt/live/sistema.seusite.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sistema.seusite.com.br/privkey.pem;

    location / {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host $host;
    }
}
