version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: proxy-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Enxerga as portas expostas pelas outras stacks no Host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Faz reload do nginx a cada 6h e também no startup (certbot)
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"
    restart: unless-stopped
    networks:
      - default
      - apps_network

  certbot:
    image: certbot/certbot
    container_name: proxy-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Acorda a cada 12h para verificar/renovar certificados e dorme de novo
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

networks:
  apps_network:
    external: true
    name: apps_network
