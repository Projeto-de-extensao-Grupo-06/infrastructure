services:
  redis:
    image: redis:latest
    platform: linux/amd64
    command: redis-server --requirepass default
    environment:
      REDIS_USER: default
      REDIS_PASSWORD: default
    ports:
      - "6379:6379"

  postgres:
    image: postgres:latest
    platform: linux/amd64
    environment:
      POSTGRES_USER: default
      POSTGRES_PASSWORD: default
      POSTGRES_DB: default
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  waha:
    image: devlikeapro/waha:latest
    platform: linux/amd64
    environment:
      WHATSAPP_HOOK_URL: http://host.docker.internal:5678/webhook/webhook
      WHATSAPP_DEFAULT_ENGINE: GOWS
      WHATSAPP_HOOK_EVENTS: message
      WAHA_NO_API_KEY: true
      WAHA_DASHBOARD_NO_PASSWORD: true
      WHATSAPP_SWAGGER_NO_PASSWORD: true
    volumes:
      - waha_sessions:/app/.sessions
      - waha_media:/app/.media
    ports:
      - "3000:3000"

  n8n:
    image: n8nio/n8n:latest
    platform: linux/amd64
    environment:
      WEBHOOK_URL: http://host.docker.internal:5678
      N8N_HOST: host.docker.internal
      GENERIC_TIMEZONE: America/Sao_Paulo
      N8N_LOG_LEVEL: debug
      N8N_SECURE_COOKIE: false
      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: true
      BOT_SECRET: "solarize_whatsapp_bot_super_secret"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"

  backend-service:
    build:
      context: ../../springboot-web-backend
      dockerfile: Dockerfile
    platform: linux/amd64
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/solarize
      SPRING_DATASOURCE_USERNAME: solarize
      SPRING_DATASOURCE_PASSWORD: "06241234"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      EMAIL: "dummy@email.com"
      PASSWORD_EMAIL: "dummy"
      SERVER_PORT: 8000
      BOT_SECRET: "solarize_whatsapp_bot_super_secret"
    ports:
      - "8000:8000"
    networks:
      - default
      - storage

networks:
  storage:
    external: true
    name: storage_default

volumes:
  pgdata:
  waha_sessions:
  waha_media:
  n8n_data:
