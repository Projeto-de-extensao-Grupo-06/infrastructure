version: "3.8"

services:
  microservice-db:
    image: mysql:8
    container_name: microservice-db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: schedule_notification_db
    ports:
      - "${PORT_MICROSERVICE_DB:-3306}:3306"
    networks:
      - solarway_network

  microservice-broker:
    image: 'rabbitmq:3-management'
    environment:
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-0624}
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - solarway_network

  microservice-app:
    image: ghcr.io/projeto-de-extensao-grupo-06/schedule-notification:latest
    container_name: schedule-notification
    ports:
      - "${PORT_BACKEND_MICROSERVICE:-8082}:8080"
    env_file:
      - ../../../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://microservice-db:3306/schedule_notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_RABBITMQ_HOST: microservice-broker
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
    restart: on-failure
    depends_on:
      - microservice-db
    networks:
      - solarway_network

networks:
  solarway_network:
    name: solarway_network
    external: true

volumes:
  rabbitmq_data: