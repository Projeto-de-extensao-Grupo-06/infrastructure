version: "3.8"

services:
  institutional-website:
    image: ghcr.io/projeto-de-extensao-grupo-06/institutional-website:latest
    container_name: institutional-website
    ports:
      - "${PORT_INSTITUTIONAL_WEBSITE:-8081}:3000"
    networks:
      - solarize_network

networks:
  solarize_network:
    name: solarize_network
    external: true
