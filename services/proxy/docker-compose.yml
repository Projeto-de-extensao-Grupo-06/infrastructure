services:
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "${PORT_PROXY:-80}:80"
      - "${PORT_PROXY_INSTITUCIONAL:-81}:81"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - solarway_network
    restart: unless-stopped

networks:
  solarway_network:
    name: solarway_network
    external: true
