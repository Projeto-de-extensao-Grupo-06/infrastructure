services:
  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "${PORT_PROXY:-80}:80"
      - "443:443"
      - "3000:3000"
      - "5678:5678"
      - "8081:8081"
      - "15672:15672"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - solarway_network
    restart: unless-stopped

networks:
  solarway_network:
    external: true
    name: solarway_network
