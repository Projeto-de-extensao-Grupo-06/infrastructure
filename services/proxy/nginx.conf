# ==============================================================================
# Solarway Nginx - Proxy Central LOCAL (Docker Compose)
#
# ARQUITETURA FIEL À AWS:
#   - Este proxy central é o único ponto de entrada público (como ec2_nginx).
#   - Cada frontend JÁ TEM seu próprio Nginx interno (nginx.conf.template)
#     que cuida de servir assets e proxiar /api/ para o backend.
#   - O proxy central roteia o tráfego para o container certo.
#
# ROTEAMENTO LOCAL (porta 80 — ponto de entrada único):
#   localhost/              → Management System (management-system:80)
#   localhost/institucional → Site Institucional (institutional-website:80)
#   localhost/api           → Backend Monolito   (backend-service:8000)
#   localhost/schedule      → Schedule Service   (schedule-notification:8080)
#   localhost/health        → Healthcheck do proxy
#
# PORTA 81 (mantida como alias de conveniência para o site institucional)
# ==============================================================================

events {
    worker_connections 1024;
}

http {
    sendfile      on;
    keepalive_timeout 65;

    # Headers padrão de proxy reverso
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ─── Servidor Principal (porta 80) ────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Automação e Bots (Redirecionamento Direto) ─────────────────────
        # Optamos por redirecionar para as portas nativas para garantir 
        # estabilidade total de assets e bibliotecas JS internas.
        location /n8n {
            return 301 http://localhost:5678;
        }

        location /waha {
            return 301 http://localhost:3000/dashboard;
        }

        # ── Site Institucional ─────────────────────────────────────────────
        location /institucional {
            proxy_pass http://institutional-website:80/;
        }

        # ── APIs e Healthcheck (Proxy Mantido) ─────────────────────────────
        location /api {
            proxy_pass http://backend-service:8000/api;
        }

        location /schedule {
            proxy_pass http://schedule-notification:8080/;
        }

        location /health {
            access_log off;
            return 200 "solarway-proxy OK\n";
            add_header Content-Type text/plain;
        }

        # ── Management System (catch-all) ──────────────────────────────────
        location / {
            proxy_pass http://management-system:80;
        }
    }

    # ─── Site Institucional — alias na porta 81 (retrocompatível) ─────────────
    server {
        listen 81;
        server_name _;

        location / {
            proxy_pass http://institutional-website:80;
        }
    }
}
