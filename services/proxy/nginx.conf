# ==============================================================================
# Solarway Nginx - Proxy Central LOCAL (Docker Compose)
#
# ARQUITETURA FIEL À AWS:
#   - Este proxy central é o único ponto de entrada público (como ec2_nginx).
#   - Cada frontend JÁ TEM seu próprio Nginx interno (nginx.conf.template)
#     que cuida de servir assets e proxiar /api/ para o backend.
#   - O proxy central apenas roteia o tráfego para o container certo.
#     Não duplica lógica de /api/ — isso é responsabilidade de cada frontend.
#
#   Porta 80: Management System  → management-system:80  (nginx interno)
#   Porta 81: Institucional      → institutional-website:80 (nginx interno)
#
# EM PRODUÇÃO (AWS):
#   Porta 80: ec2_nginx → 10.0.2.x:8080 (VM frontend-management)
#   Porta 80: ec2_nginx → 10.0.2.x:8081 (VM frontend-institucional)
#   Cada VM tem seu Nginx próprio que já resolve /api/ → backend VM privado.
# ==============================================================================

events {
    worker_connections 1024;
}

http {
    sendfile      on;
    keepalive_timeout 65;

    # Headers padrão de proxy reverso
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ─── Management System (porta 80) ─────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        location /health {
            access_log off;
            return 200 "solarway-proxy OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass http://management-system:80;
        }
    }

    # ─── Institucional Website (porta 81) ─────────────────────────────────────
    server {
        listen 81;
        server_name _;

        location / {
            proxy_pass http://institutional-website:80;
        }
    }
}
