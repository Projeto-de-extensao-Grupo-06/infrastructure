# ==============================================================================
# Solarway Nginx - Proxy LOCAL (nginx.local.conf)
#
# !! ESTE ARQUIVO É EXCLUSIVO PARA DESENVOLVIMENTO LOCAL !!
# Não altere este arquivo pensando em prod/qa.
#
# Para PROD/QA: edite nginx.conf.template
#   → envsubst processa o template e gera nginx.conf na VM durante o deploy
#
# Diferenças específicas para o ambiente local:
#   1. resolver 127.0.0.11 — DNS interno do Docker (evita "host not found" no startup)
#   2. set $upstream — resolve nomes por request, não no startup
#   3. X-Forwarded-Proto: https — Spring Boot (perfil prod) faz HTTPS enforcement;
#      sem isso, gera ERR_TOO_MANY_REDIRECTS localmente
#   4. proxy_redirect off — evita rewrite de Location com hostname interno do container
#   5. Portas 3000/5678/8081 NÃO expostas (bot-waha, bot-n8n e
#      institutional-website já as ocupam diretamente no host local)
#
# ROTEAMENTO LOCAL (porta 80):
#   localhost/              → management-system:80
#   localhost/institucional → institutional-website:80
#   localhost/api           → backend-service:8000/api
#   localhost/schedule      → schedule-notification:8080
#   localhost/health        → healthcheck do proxy
#   localhost/n8n           → redirect 301 → :5678
#   localhost/waha          → redirect 301 → :3000/dashboard
# ==============================================================================

events {
    worker_connections 1024;
}

http {
    sendfile      on;
    keepalive_timeout 65;

    # DNS interno do Docker — resolve por request, não no startup.
    # Em prod/qa os upstreams são IPs fixos da VPC, não precisam disso.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    # Sinaliza HTTPS ao Spring Boot (perfil prod tem HTTPS enforcement via X-Forwarded-Proto).
    # Em prod o nginx termina SSL real e este header é gerado com valor correto pelo próprio nginx.
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port  443;
    proxy_set_header X-Forwarded-Host  $host;

    # Impede que o nginx reescreva headers Location com o hostname interno do container.
    proxy_redirect off;

    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # ─── Servidor Principal (porta 80) ────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Automação e Bots (Acesso Direto por Porta) ─────────────────────
        location /n8n {
            return 301 http://$host:5678;
        }

        location /waha {
            return 301 http://$host:3000/dashboard;
        }

        # ── Site Institucional ─────────────────────────────────────────────
        location /institucional {
            set $up_institucional institutional-website;
            proxy_pass http://$up_institucional:80/;
        }

        # ── API Backend ────────────────────────────────────────────────────
        location /api/ {
            set $up_backend backend-service;
            proxy_pass http://$up_backend:8000/api/;
            proxy_set_header X-Forwarded-Prefix /api;

            # CORS Local Fix: Intercepta preflight OPTIONS e força headers
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '$http_origin' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

            # Evita duplicidade se o backend também enviar
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Credentials';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
        }

        location /api {
            return 301 $scheme://$http_host/api/;
        }

        # ── Schedule Microservice ──────────────────────────────────────────
        location /schedule {
            set $up_schedule schedule-notification;
            proxy_pass http://$up_schedule:8080/;
        }

        location /health {
            access_log off;
            return 200 "solarway-proxy OK\n";
            add_header Content-Type text/plain;
        }

        # ── Management System (catch-all) ──────────────────────────────────
        location / {
            set $up_management management-system;
            proxy_pass http://$up_management:80;
        }
    }

    # ─── Site Institucional — alias na porta 81 (retrocompatível) ─────────────
    server {
        listen 81;
        server_name _;

        location / {
            set $up_institucional institutional-website;
            proxy_pass http://$up_institucional:80;
        }
    }
}
