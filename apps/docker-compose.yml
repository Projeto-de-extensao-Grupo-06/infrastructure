version: "3.8"

services:
  backend-service:
    image: raniersptech/springboot-web-backend:latest
    restart: on-failure
    platform: linux/amd64
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/solarize?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: solarize
      SPRING_DATASOURCE_PASSWORD: "06241234"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DATA_REDIS_HOST: redis-multidb
      SPRING_DATA_REDIS_PORT: 6379
      EMAIL: "dummy@email.com"
      PASSWORD_EMAIL: "dummy"
      SERVER_PORT: 8000
      BOT_SECRET: "solarize_whatsapp_bot_super_secret"
      BUCKET_NAME: "dummy-bucket"
      AWS_ACCESS_KEY_ID: "dummy"
      AWS_SECRET_ACCESS_KEY: "dummy"
      AWS_SESSION_TOKEN: "dummy"

    ports:
      - "8000:8000"
    networks:
      - apps_network
      - storage_network

  frontend-service:
    image: raniersptech/management-system:latest
    ports:
      - "8080:3000"
    networks:
      - apps_network

  institutional-website:
    image: raniersptech/institutional-website:latest
    ports:
      - "8081:3000"
    networks:
      - apps_network

# TODO - lembrar de colocar o microserviço de schedule-notification do Fabrício


networks:
  apps_network:
    name: apps_network
    driver: bridge
  storage_network:
    external: true
    name: storage_network
